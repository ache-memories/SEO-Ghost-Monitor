<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Ghost Monitor | Pro Edition</title>
    <link rel="icon" href="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f47b.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

        :root {
            --bg: #0a0a0a;
            --card: #141414;
            --border: #262626;
            --text: #ffffff;
            --ghost-green: #2ecc71;
            --subtext: #a3a3a3;
            --accent-blue: #58a6ff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--accent-blue);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .tagline {
            color: var(--subtext);
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        input {
            background: #1f1f1f;
            border: 1px solid var(--border);
            color: white;
            padding: 14px 16px;
            border-radius: 8px;
            width: 100%;
            font-size: 1rem;
            margin-bottom: 1.2rem;
            box-sizing: border-box;
            transition: 0.3s;
            outline: none;
        }

        input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
        }

        button {
            background: var(--ghost-green);
            color: #000;
            font-weight: 600;
            border: none;
            padding: 14px;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        #result {
            margin-top: 2rem;
            padding: 1.2rem;
            border-radius: 8px;
            background: #0d1117;
            border: 1px solid var(--border);
            display: none;
            text-align: left;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            overflow-x: auto;
        }

        .support-card {
            width: 100%;
            max-width: 500px;
            background: var(--card);
            border: 1px dashed var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: left;
        }

        .support-card h3 {
            color: #f0f6fc;
            font-size: 1.1rem;
            margin-top: 0;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .links-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .social-link {
            color: var(--subtext);
            text-decoration: none;
            font-size: 0.85rem;
            padding: 10px;
            border-radius: 6px;
            background: #1c2128;
            border: 1px solid var(--border);
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .social-link:hover {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }

        .portfolio {
            grid-column: span 2;
            border-color: rgba(240, 136, 62, 0.2);
            color: #f0883e;
            justify-content: center;
        }

        .portfolio:hover {
            border-color: #f0883e;
            color: #f0883e;
        }

        .status-tag {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.75rem;
            margin-bottom: 10px;
            background: rgba(46, 204, 113, 0.15);
            color: var(--ghost-green);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>👻 SEO Ghost Monitor</h1>
        <p class="tagline">Track instant SEO changes and site fingerprints</p>
        
        <input type="text" id="urlInput" placeholder="Enter target URL (https://...)" value="https://www.google.com">
        <button onclick="checkSite()">Analyze Website</button>
        
        <div id="result"></div>
    </div>

    <div class="support-card">
        <h3>📫 Connect & Support</h3>
        <div class="links-grid">
            <a href="https://t.me/adnanzzzz3" target="_blank" class="social-link"><span>✈️</span> Telegram</a>
            <a href="https://www.facebook.com/adnanzzzz3/" target="_blank" class="social-link"><span>🔵</span> Facebook</a>
            <a href="https://x.com/adnanzzzz3" target="_blank" class="social-link"><span>🐦</span> X (Twitter)</a>
            <a href="https://instagram.com/adnanzzzz3" target="_blank" class="social-link"><span>📸</span> Instagram</a>
            <a href="https://beacons.ai/adnan.hasan" target="_blank" class="social-link portfolio"><span>❤️</span> Support This Project</a>
        </div>
    </div>

    <script>
        async function checkSite() {
            const urlInput = document.getElementById('urlInput').value;
            const resultDiv = document.getElementById('result');
            
            if (!urlInput) return alert("Please enter a valid URL");

            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '<span style="color: var(--subtext)">Tracing ghost signals...</span>';

            try {
                const response = await fetch(`/api/monitor?url=${encodeURIComponent(urlInput)}`);
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <div class="status-tag">SIGNAL ACQUIRED</div><br>
                        <strong style="color: var(--subtext)">TARGET:</strong> ${data.url}<br><br>
                        <strong style="color: var(--subtext)">FINGERPRINT (MD5):</strong><br>
                        <span style="color: #d2a8ff">${data.current_hash || data.fingerprint}</span>
                    `;
                } else {
                    resultDiv.innerHTML = `<span style="color: #ff7b72">ERROR: ${data.error || 'Check failed'}</span>`;
                }
            } catch (err) {
                resultDiv.innerHTML = `<span style="color: #ff7b72">CONNECTION FAILED</span>`;
            }
        }
    </script>
</body>
</html>
