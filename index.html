<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Ghost Engine | Pro Dashboard</title>
    <link rel="icon" href="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f47b.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg: #050505;
            --card: #0c0c0c;
            --border: #1a1a1a;
            --accent: #2ecc71;
            --text-main: #ffffff;
            --text-dim: #888888;
            --blue: #3498db;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .hero-section { text-align: center; margin-bottom: 3rem; width: 100%; max-width: 800px; }
        h1 { font-size: 2.2rem; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .subtitle { color: var(--text-dim); font-size: 1.1rem; }

        .search-box {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 8px;
            border-radius: 14px;
            display: flex;
            width: 100%;
            max-width: 600px;
            margin-bottom: 3rem;
        }
        
        input { background: transparent; border: none; color: white; padding: 12px 18px; flex-grow: 1; outline: none; font-size: 1rem; }
        button { background: var(--accent); color: black; border: none; padding: 12px 28px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        button:hover { opacity: 0.8; }

        /* Dashboard Grid */
        .dashboard { display: none; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; margin-bottom: 3rem; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 24px; border-radius: 16px; text-align: left; }
        .label { color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; display: block; }
        .value { font-size: 1.1rem; font-weight: 600; word-break: break-all; }
        .score-circle { width: 110px; height: 110px; border-radius: 50%; border: 6px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 800; margin: 0 auto 15px; background: rgba(46, 204, 113, 0.05); }

        /* Connect Card */
        .connect-card {
            background: var(--card);
            border: 1px dashed #222;
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            max-width: 600px;
            margin-top: auto;
        }

        .connect-header { display: flex; align-items: center; gap: 10px; font-size: 1rem; font-weight: 600; margin-bottom: 20px; }
        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .social-item {
            background: #111;
            border: 1px solid var(--border);
            padding: 12px 15px;
            border-radius: 12px;
            color: var(--text-dim);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .social-item:hover { border-color: #333; color: white; }
        .support-full-btn {
            background: #111;
            border: 1px solid var(--border);
            padding: 14px;
            border-radius: 12px;
            color: #f0883e;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 600;
        }

        .loading { color: var(--accent); margin: 20px 0; display: none; font-weight: 500; }
    </style>
</head>
<body>

    <div class="hero-section">
        <h1>👻 SEO Ghost Engine</h1>
        <p class="subtitle">Enterprise-grade website integrity & SEO auditing</p>
    </div>

    <div class="search-box">
        <input type="text" id="urlInput" placeholder="https://your-website.com" value="https://www.google.com">
        <button onclick="analyzeSite()">Analyze</button>
    </div>

    <div id="loader" class="loading">Deep scanning in progress...</div>

    <div class="dashboard" id="dashboard">
        <div class="stat-card" style="text-align: center; grid-column: 1 / -1;">
            <div class="score-circle" id="scoreValue">--</div>
            <span class="label">SEO Health Score</span>
        </div>
        <div class="stat-card">
            <span class="label">📡 Site Identity</span>
            <div class="value" id="siteTitle">--</div>
        </div>
        <div class="stat-card">
            <span class="label">🔒 Integrity Hash</span>
            <div class="value" id="siteHash" style="color: var(--accent); font-family: monospace;">--</div>
        </div>
        <div class="stat-card">
            <span class="label">⚙️ Verification</span>
            <div class="value" id="siteStatus" style="color: var(--blue);">Active Signal</div>
        </div>
    </div>

    <div class="connect-card">
        <div class="connect-header">📬 Connect & Support</div>
        <div class="social-grid">
            <a href="https://t.me/adnanzzzz3" class="social-item" target="_blank">✈️ Telegram</a>
            <a href="https://facebook.com/adnanzzzz3" class="social-item" target="_blank">🔵 Facebook</a>
            <a href="https://x.com/adnanzzzz3" class="social-item" target="_blank">🐦 X (Twitter)</a>
            <a href="https://instagram.com/adnanzzzz3" class="social-item" target="_blank">📸 Instagram</a>
        </div>
        <a href="https://beacons.ai/adnan.hasan" class="support-full-btn" target="_blank">❤️ Support This Project</a>
    </div>

    <script>
        async function analyzeSite() {
            const urlInput = document.getElementById('urlInput');
            const dashboard = document.getElementById('dashboard');
            const loader = document.getElementById('loader');
            const url = urlInput.value;

            if (!url) return alert("يرجى ادخال رابط الموقع");

            loader.style.display = 'block';
            dashboard.style.display = 'none';

            try {
                // استدعاء ملف monitor.js الموجود في مجلد api
                const response = await fetch(`/api/monitor?url=${encodeURIComponent(url)}`);
                const data = await response.json();

                if (response.ok) {
                    let score = 100; // قيمة افتراضية للنجاح
                    document.getElementById('scoreValue').innerText = score + '%';
                    document.getElementById('siteTitle').innerText = data.url || url;
                    // استخدام المتغيرات الصحيحة من الـ API لضمان ظهور البصمة
                    document.getElementById('siteHash').innerText = data.current_hash || data.fingerprint || "Error Generating Hash";
                    
                    loader.style.display = 'none';
                    dashboard.style.display = 'grid';
                } else {
                    alert("فشل التحليل، يرجى التحقق من الرابط");
                    loader.style.display = 'none';
                }
            } catch (err) {
                console.error(err);
                alert("خطا في الاتصال بالخادم");
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
