<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Ghost Engine | Advanced Dashboard</title>
    <link rel="icon" href="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f47b.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg: #050505;
            --card: #0c0c0c;
            --border: #1a1a1a;
            --accent: #2ecc71;
            --text-main: #ffffff;
            --text-dim: #888888;
            --blue: #3498db;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- الأقسام العلوية --- */
        .hero-section { text-align: center; margin-bottom: 3rem; width: 100%; max-width: 800px; }
        h1 { font-size: 2.2rem; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .subtitle { color: var(--text-dim); font-size: 1.1rem; }

        .search-box {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 8px;
            border-radius: 14px;
            display: flex;
            width: 100%;
            max-width: 600px;
            margin-bottom: 3rem;
        }
        
        input { background: transparent; border: none; color: white; padding: 12px 18px; flex-grow: 1; outline: none; }
        button { background: var(--accent); color: black; border: none; padding: 12px 28px; border-radius: 10px; font-weight: 700; cursor: pointer; }

        /* --- الداشبورد --- */
        .dashboard { display: none; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; margin-bottom: 3rem; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 24px; border-radius: 16px; }

        /* --- قسم الدعم والاتصال (التعديل الجديد) --- */
        .connect-card {
            background: var(--card);
            border: 1px dashed #333; /* حدود منقطة خفيفة كما في الصورة */
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            max-width: 600px;
            margin-top: auto;
        }

        .connect-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        .social-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* عمودين كما في الصورة */
            gap: 12px;
            margin-bottom: 15px;
        }

        .social-item {
            background: #111;
            border: 1px solid var(--border);
            padding: 12px 15px;
            border-radius: 12px;
            color: var(--text-dim);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .social-item:hover {
            border-color: #333;
            background: #161616;
            color: var(--text-main);
        }

        .support-full-btn {
            background: #111;
            border: 1px solid var(--border);
            padding: 14px;
            border-radius: 12px;
            color: #f0883e;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 600;
            transition: 0.2s;
        }

        .support-full-btn:hover {
            border-color: #f0883e33;
            background: #161616;
        }

        .loading { color: var(--accent); margin-top: 20px; display: none; }
    </style>
</head>
<body>

        <h1>👻 SEO Ghost Engine</h1>
        <p class="subtitle">Enterprise-grade website integrity auditing</p>
    </div>

        <button onclick="analyzeSite()">Analyze</button>
    </div>

    <div id="loader" class="loading">Scanning...</div>

    <div class="dashboard" id="dashboard">
        </div>

        </div>

            </a>
            <a href="https://facebook.com/adnanzzzz3" class="social-item">
                🔵 Facebook
            </a>
            <a href="https://x.com/adnanzzzz3" class="social-item">
                🐦 X (Twitter)
            </a>
            <a href="https://instagram.com/adnanzzzz3" class="social-item">
                📸 Instagram
            </a>
        </div>

        <a href="https://beacons.ai/adnan.hasan" class="support-full-btn">
            ❤️ Support This Project
        </a>
    </div>

</body>
</html>
