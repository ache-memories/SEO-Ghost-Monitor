<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Ghost Monitor | مراقب الأشباح</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d1117; color: #c9d1d9; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #161b22; padding: 2rem; border-radius: 12px; border: 1px solid #30363d; box-shadow: 0 8px 32px rgba(0,0,0,0.5); width: 90%; max-width: 500px; text-align: center; }
        h1 { color: #58a6ff; margin-bottom: 1.5rem; font-size: 1.8rem; }
        input { width: 100%; padding: 12px; margin-bottom: 1rem; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 6px; border: none; background-color: #238636; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #2ea043; }
        #result { margin-top: 1.5rem; padding: 1rem; border-radius: 6px; background: #0d1117; border: 1px solid #30363d; display: none; text-align: left; font-family: monospace; font-size: 0.9rem; overflow-x: auto; }
        .loading { color: #8b949e; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>👻 SEO Ghost Monitor</h1>
        <p>أدخل رابط الموقع لمراقبته فوراً</p>
        <input type="text" id="urlInput" placeholder="https://example.com" value="https://www.google.com">
        <button onclick="checkSite()">فحص التغييرات</button>
        <div id="loading" class="loading">جاري سحب بيانات الموقع...</div>
        <div id="result"></div>
    </div>

    <script>
        async function checkSite() {
            const urlInput = document.getElementById('urlInput').value;
            const resultDiv = document.getElementById('result');
            const loading = document.getElementById('loading');
            
            if (!urlInput) return alert("يرجى إدخال رابط!");

            resultDiv.style.display = 'none';
            loading.style.display = 'block';

            try {
                const response = await fetch(`/api/monitor?url=${encodeURIComponent(urlInput)}`);
                const data = await response.json();
                
                loading.style.display = 'none';
                resultDiv.style.display = 'block';
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <span style="color: #7ee787">✅ تم الفحص بنجاح</span><br><br>
                        <strong>الرابط:</strong> ${data.url}<br>
                        <strong>البصمة (Hash):</strong><br>
                        <span style="color: #d2a8ff">${data.current_hash}</span>
                    `;
                } else {
                    resultDiv.innerHTML = `<span style="color: #ff7b72">❌ خطأ: ${data.error || 'تعذر الفحص'}</span><br><small>${data.details || ''}</small>`;
                }
            } catch (err) {
                loading.style.display = 'none';
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `<span style="color: #ff7b72">❌ فشل الاتصال بالسيرفر</span>`;
            }
        }
    </script>
</body>
</html>
