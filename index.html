<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Ghost Engine | Advanced Dashboard</title>
    <link rel="icon" href="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f47b.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg: #050505;
            --card: #0f0f0f;
            --border: #1e1e1e;
            --accent: #2ecc71;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --blue: #3498db;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero-section { text-align: center; margin-bottom: 3rem; width: 100%; max-width: 800px; }
        h1 { font-size: 2.2rem; font-weight: 700; margin-bottom: 10px; letter-spacing: -1px; }
        .subtitle { color: var(--text-dim); font-size: 1.1rem; }

        .search-box {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 8px;
            border-radius: 14px;
            display: flex;
            width: 100%;
            max-width: 600px;
            margin-bottom: 3rem;
            transition: 0.3s;
        }
        .search-box:focus-within { border-color: var(--accent); box-shadow: 0 0 20px rgba(46, 204, 113, 0.1); }
        
        input {
            background: transparent;
            border: none;
            color: white;
            padding: 12px 18px;
            flex-grow: 1;
            font-size: 1rem;
            outline: none;
        }

        button {
            background: var(--accent);
            color: black;
            border: none;
            padding: 12px 28px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { opacity: 0.9; transform: scale(0.98); }

        /* Dashboard Grid */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
            display: none; /* يظهر فقط عند النتيجة */
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 16px;
            transition: 0.3s;
        }
        .stat-card:hover { border-color: #333; transform: translateY(-5px); }
        
        .label { color: var(--text-dim); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; display: block; }
        .value { font-size: 1.1rem; font-weight: 600; word-break: break-all; }
        .score-circle { width: 80px; height: 80px; border-radius: 50%; border: 4px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 800; margin: 0 auto 15px; }

        .support-footer {
            margin-top: 4rem;
            width: 100%;
            max-width: 1000px;
            border-top: 1px solid var(--border);
            padding-top: 2rem;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }
        .social-chip {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 50px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .social-chip:hover { border-color: var(--blue); color: var(--blue); }

        .loading { font-style: italic; color: var(--accent); margin-top: 20px; display: none; }
    </style>
</head>
<body>

    <div class="hero-section">
        <h1>👻 SEO Ghost Engine</h1>
        <p class="subtitle">Enterprise-grade website integrity & SEO auditing</p>
    </div>

    <div class="search-box">
        <input type="text" id="urlInput" placeholder="https://your-website.com" value="https://www.google.com">
        <button onclick="analyzeSite()">Run Audit</button>
    </div>

    <div id="loader" class="loading">Initiating deep scan...</div>

    <div class="dashboard" id="dashboard">
        <div class="stat-card" style="text-align: center; grid-column: 1 / -1;">
            <div class="score-circle" id="scoreValue">--</div>
            <span class="label">Overall SEO Health Score</span>
        </div>

        <div class="stat-card">
            <span class="label">📡 Site Identity</span>
            <div class="value" id="siteTitle">Scanning...</div>
        </div>

        <div class="stat-card">
            <span class="label">🔒 Integrity Fingerprint (MD5)</span>
            <div class="value" id="siteHash" style="color: var(--accent); font-family: monospace;">--</div>
        </div>

        <div class="stat-card">
            <span class="label">⚙️ Server Status</span>
            <div class="value" id="siteStatus" style="color: var(--blue);">Active</div>
        </div>
    </div>

    <div class="support-footer">
        <a href="https://t.me/adnanzzzz3" target="_blank" class="social-chip">Telegram</a>
        <a href="https://x.com/adnanzzzz3" target="_blank" class="social-chip">X / Twitter</a>
        <a href="https://beacons.ai/adnan.hasan" target="_blank" class="social-chip" style="color: #f0883e;">Support Project</a>
    </div>

    <script>
        async function analyzeSite() {
            const url = document.getElementById('urlInput').value;
            const dashboard = document.getElementById('dashboard');
            const loader = document.getElementById('loader');

            if (!url) return alert("URL required!");

            loader.style.display = 'block';
            dashboard.style.display = 'none';

            try {
                const response = await fetch(`/api/monitor?url=${encodeURIComponent(url)}`);
                const data = await response.json();

                if (response.ok) {
                    // محاكاة نظام التقييم (Scoring Logic)
                    let score = 0;
                    if (data.url) score += 30;
                    if (data.current_hash || data.fingerprint) score += 40;
                    if (data.title || data.url.length > 5) score += 30; // افتراض وجود محتوى

                    document.getElementById('scoreValue').innerText = score + '%';
                    document.getElementById('siteTitle').innerText = data.url;
                    document.getElementById('siteHash').innerText = data.current_hash || data.fingerprint;
                    
                    loader.style.display = 'none';
                    dashboard.style.display = 'grid';
                } else {
                    alert("Error scanning site. Please check the URL.");
                    loader.style.display = 'none';
                }
            } catch (err) {
                alert("Connection error.");
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
